<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Favicon Configuration -->
    <!-- Dark mode: show white/light favicon so it's visible on dark backgrounds -->
    <link rel="icon" type="image/png" href="/favicon-light.png" media="(prefers-color-scheme: dark)" />
    <!-- Light mode: show black/dark favicon so it's visible on light backgrounds -->
    <link rel="icon" type="image/png" href="/favicon-dark.png" media="(prefers-color-scheme: light)" />
    <!-- Default fallback -->
    <link rel="icon" type="image/png" href="/favicon-dark.png" />
    
    <!-- Primary SEO Meta Tags -->
    <title>BPL Studios — Premium Design Studio by Ahmed Arjdal</title>
    <meta name="description" content="BPL Studios is an award-winning premium design studio founded by Ahmed Arjdal. Operating across Africa, Europe, and the MENA region, we build world-class brand identities and high-performance digital experiences." />
    <meta name="keywords" content="Design Studio, Brand Identity, UX/UI Design, Creative Direction, Ahmed Arjdal, Agadir Morocco, Web Development, Premium Design" />
    <meta name="author" content="Ahmed Arjdal" />
    
    <!-- Open Graph / Facebook -->
